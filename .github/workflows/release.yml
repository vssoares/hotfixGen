name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Calcular versao e tag
        id: meta
        shell: pwsh
        run: |
          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $version = $conf.version
          if (-not $version) { throw "Nao foi possivel ler .version do src-tauri/tauri.conf.json" }
          $tag = "v$version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Criar tag e subir (se nao existir)
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          git fetch --tags --force
          $exists = $false
          git rev-parse -q --verify "refs/tags/$tag" *> $null
          if ($LASTEXITCODE -eq 0) { $exists = $true }

          if ($exists) {
            "created=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Tag $tag ja existe. Nada a publicar."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a $tag -m "Release $tag"
          git push origin $tag
          "created=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build e publicar release
        if: steps.tag.outputs.created == 'true' || github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ProjectManager ${{ steps.meta.outputs.tag }}
          releaseBody: |
            ## O que há de novo
            Veja os commits para detalhes das mudanças.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          tauriScript: npx tauri
